name: Bug 报告
description: 提交问题报告，帮助我们改进 CatCal
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交 Bug 报告！请尽可能详细地描述问题。

  - type: input
    id: version
    attributes:
      label: App 版本
      placeholder: 如 1.1.1
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 设备型号 & 系统版本
      placeholder: 如 iPhone 15 Pro, iOS 18.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请描述你遇到了什么问题
      placeholder: 清晰简洁地描述问题现象
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请列出触发问题的操作步骤
      placeholder: |
        1. 打开 App
        2. 点击 xxx
        3. 观察到 xxx 错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望的正确行为是什么？
      placeholder: 期望 xxx 应该正常显示/工作

  - type: textarea
    id: screenshot
    attributes:
      label: 截图或录屏（可选）
      description: 如有截图，请拖拽到此处
